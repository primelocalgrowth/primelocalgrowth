<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B3A6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" fill="#0f172a"/>
  <!-- Main circle with gradient -->
  <circle cx="90" cy="90" r="70" fill="url(#grad)"/>
  <!-- "P" letter mark -->
  <text x="90" y="115" font-family="Poppins, sans-serif" font-size="80" font-weight="700" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">P</text>
</svg>