<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B3A6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Accent bar -->
  <rect width="1200" height="8" fill="#0ea5e9" y="0"/>

  <!-- Logo/Icon circle -->
  <circle cx="120" cy="120" r="80" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="120" cy="120" r="60" fill="none" stroke="#0ea5e9" stroke-width="3"/>
  <text x="120" y="140" font-family="Poppins, sans-serif" font-size="60" font-weight="700" fill="#0ea5e9" text-anchor="middle">P</text>

  <!-- Main headline -->
  <text x="240" y="100" font-family="Poppins, sans-serif" font-size="72" font-weight="800" fill="#f8fafc">Show Up on</text>
  <text x="240" y="190" font-family="Poppins, sans-serif" font-size="72" font-weight="800" fill="#0ea5e9">Google</text>

  <!-- Subheading -->
  <text x="240" y="280" font-family="Inter, sans-serif" font-size="36" font-weight="500" fill="#cbd5e1">Get more customers in 30 days</text>

  <!-- Bottom messaging -->
  <line x1="240" y1="320" x2="480" y2="320" stroke="#0ea5e9" stroke-width="4"/>

  <!-- Key points -->
  <text x="240" y="380" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc">✓ Done-for-you Google visibility</text>
  <text x="240" y="430" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc">✓ No long-term contract • Transparent monthly reporting</text>
  <text x="240" y="480" font-family="Inter, sans-serif" font-size="28" fill="#f8fafc">✓ 50+ local businesses already growing</text>

  <!-- Footer -->
  <text x="600" y="580" font-family="Poppins, sans-serif" font-size="24" font-weight="600" fill="#0ea5e9" text-anchor="middle">primelocalgrowth.com</text>
</svg>
